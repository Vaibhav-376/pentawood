version: "3.8"

services:
  app:
    container_name: pentawood
    build: .
    restart: always
    env_file:
      - .env
    networks:
      - app-network
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge